<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiDepot - Sistem Informasi Desa Potanga</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body class="bg-[#07080c] text-white min-h-screen relative overflow-x-hidden selection:bg-indigo-500 selection:text-white">

  <!-- BACKGROUND NEBULA KOSMIK -->
  <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-purple-900/10 blur-[130px] pointer-events-none"></div>
  <div class="absolute top-[30%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-indigo-900/10 blur-[160px] pointer-events-none"></div>

  <!-- TOAST NOTIFICATION CONTAINER -->
  <div id="toast-container" class="fixed top-5 right-5 z-50 space-y-3"></div>

  <!-- HALAMAN 1: LANDING & LOGIN PAGE -->
  <div id="page-landing" class="block">
    <nav class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between relative z-10">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-gradient-to-tr from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center font-bold text-lg shadow-lg">🏛️</div>
        <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">SiDepot</span>
      </div>
      <button onclick="openLoginModal()" class="bg-white text-slate-950 px-5 py-2.5 rounded-full text-sm font-semibold hover:bg-slate-200 transition-all">Masuk Aplikasi</button>
    </nav>

    <header class="max-w-5xl mx-auto text-center px-6 pt-24 pb-12 relative z-10">
      <h1 class="text-4xl md:text-6xl font-bold tracking-tight max-w-4xl mx-auto leading-[1.15] bg-gradient-to-b from-white via-white to-slate-500 bg-clip-text text-transparent">
        Kelola administrasi & layanan desa jauh lebih modern
      </h1>
      <p class="mt-6 text-base text-slate-400 max-w-2xl mx-auto font-light">
        Sistem pembagian kerja digital antara Staf Pelayanan (Input & Cetak) dan Kepala Desa (Approve & TTE Digital).
      </p>
      <button onclick="openLoginModal()" class="mt-10 bg-white text-slate-950 px-8 py-3 rounded-full font-semibold hover:bg-slate-200 transition shadow-xl">
        Buka Ruang Kerja Digital →
      </button>
    </header>
  </div>

  <!-- FLOATING MODAL LOGIN -->
  <div id="login-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md hidden items-center justify-center z-50 px-4">
    <div class="glass-panel w-full max-w-md rounded-3xl p-8 shadow-2xl relative border border-white/10">
      <button onclick="closeLoginModal()" class="absolute top-5 right-5 text-slate-400 hover:text-white">✕</button>
      <div class="text-center mb-8">
        <h2 class="text-2xl font-bold tracking-tight">Otentikasi SiDepot</h2>
        <p class="text-xs text-slate-400 mt-1">Gunakan 'admin' atau 'petugas' untuk simulasi cepat</p>
      </div>
      <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase">ID / Username</label>
          <input type="text" id="username" required placeholder="Masukkan ID pengguna" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-white transition">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase">Password</label>
          <input type="password" id="password" required placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-white transition">
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white py-3 rounded-xl font-medium text-sm mt-2">Masuk Sistem</button>
      </form>
    </div>
  </div>

  <!-- HALAMAN 2: LIVE APPLICATION DASHBOARD -->
  <div id="page-dashboard" class="hidden max-w-7xl mx-auto px-4 py-8 relative z-10">
    <div class="glass-panel rounded-3xl p-4 md:p-6 shadow-2xl flex flex-col lg:flex-row gap-6 min-h-[80vh]">
      
      <!-- SIDEBAR NAVIGASI SISTEM (Dapat Berubah Sesuai image_c0804b.png & image_c080a5.png) -->
      <aside class="w-full lg:w-64 flex flex-col justify-between border-b lg:border-b-0 lg:border-r border-white/10 pb-6 lg:pb-0 lg:pr-6">
        <div class="space-y-6">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-emerald-500/20 text-emerald-400 rounded-lg flex items-center justify-center text-xs">🟢</div>
            <div>
              <!-- Profil Menyesuaikan Otomatis -->
              <h4 class="text-sm font-bold tracking-wide uppercase" id="user-display-role">STAF PELAYANAN HQ</h4>
              <span class="text-[11px] text-slate-400 font-medium" id="user-display-name">Perangkat Desa Potanga</span>
            </div>
          </div>
          
          <nav class="flex flex-row lg:flex-col gap-1 text-sm font-medium text-slate-400" id="sidebar-menu">
            <button onclick="switchTab('utama')" id="tab-utama" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-white/10 text-white text-left">📊 Dashboard Utama</button>
            <button onclick="switchTab('surat')" id="tab-surat" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 hover:text-white text-left">📝 Surat Keterangan</button>
            <button onclick="switchTab('warga')" id="tab-warga" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 hover:text-white text-left">👥 Data Warga</button>
            <button onclick="switchTab('pengaduan')" id="tab-pengaduan" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 hover:text-white text-left">💡 Pengaduan Warga</button>
          </nav>
        </div>

        <button onclick="handleLogout()" class="mt-8 w-full border border-red-500/20 bg-red-500/5 text-red-400 py-2.5 rounded-xl text-xs font-semibold hover:bg-red-500/20 transition">
          🚪 Keluar Aplikasi
        </button>
      </aside>

      <!-- MAIN MANAGEMENT PANEL -->
      <main class="flex-1 text-slate-900" id="main-panel-content">
        <!-- Konten Diisi Dinamis Melalui JavaScript -->
      </main>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/XXXX/exec"; // Ganti dengan Web App URL Anda
    
    // STATE DATA UTAMA APLIKASI
    let currentUser = null; 
    let state = {
      surat: [
        { id: 101, nama: "Budi Santoso", nik: "750101xxxxxx", jenis: "Surat Keterangan Tidak Mampu", status: "Menunggu Approve" },
        { id: 102, nama: "Siti Rahma", nik: "750102xxxxxx", jenis: "Surat Pengantar Domisili", status: "Selesai (TTE)" }
      ]
    };

    window.onload = function() {
      const saved = localStorage.getItem('sidepot_session');
      if(saved) { initDashboard(JSON.parse(saved)); }
    };

    function openLoginModal() { document.getElementById('login-modal').style.display = 'flex'; }
    function closeLoginModal() { document.getElementById('login-modal').style.display = 'none'; }

    function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('username').value.toLowerCase();
      
      // Simulasi Otentikasi Role Berdasarkan Gambar Referensi
      if(user === "admin" || user === "kades") {
        currentUser = { nama: "Admin Desa (Kepala Desa)", role: "admin" };
      } else {
        currentUser = { nama: "Juanda Saputra", role: "petugas" };
      }
      
      localStorage.setItem('sidepot_session', JSON.stringify(currentUser));
      initDashboard(currentUser);
      showToast("Selamat datang di ekosistem digital SiDepot!", "success");
    }

    function initDashboard(user) {
      currentUser = user;
      closeLoginModal();
      document.getElementById('page-landing').style.display = 'none';
      document.getElementById('page-dashboard').style.display = 'flex';
      
      // Konfigurasi Header Profil Berdasarkan Gambar Referensi
      if(user.role === 'admin') {
        document.getElementById('user-display-role').innerText = "ADMIN HQ";
        document.getElementById('user-display-name').innerText = "Admin Desa";
      } else {
        document.getElementById('user-display-role').innerText = "STAF PELAYANAN HQ";
        document.getElementById('user-display-name').innerText = "Perangkat Desa Potanga";
      }
      renderTabUtama();
    }

    function handleLogout() {
      localStorage.removeItem('sidepot_session');
      document.getElementById('page-dashboard').style.display = 'none';
      document.getElementById('page-landing').style.display = 'block';
    }

    function switchTab(tabName) {
      const menu = document.getElementById('sidebar-menu');
      menu.querySelectorAll('button').forEach(btn => btn.className = "w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 hover:text-white text-left");
      document.getElementById(`tab-${tabName}`).className = "w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-white/10 text-white text-left";
      
      if(tabName === 'utama') renderTabUtama();
      if(tabName === 'surat') renderTabSurat();
    }

    // TAB DASHBOARD UTAMA
    function renderTabUtama() {
      const panel = document.getElementById('main-panel-content');
      panel.innerHTML = `
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-xl font-bold text-white tracking-tight">Dashboard Utama</h2>
          <span class="bg-white/5 border border-white/10 text-slate-400 text-xs px-4 py-2 rounded-xl">Sesi Aktif: ${currentUser.role.toUpperCase()}</span>
        </div>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          <div class="bg-white rounded-2xl p-4 flex flex-col justify-between min-h-[110px]">
            <span class="text-xs text-slate-500 font-medium">📄 Total Berkas Masuk</span>
            <span class="text-2xl font-bold text-slate-900 mt-2">${state.surat.length} Berkas</span>
            <p class="text-[10px] text-slate-400 mt-1">Sinkronisasi Basis Data Awan</p>
          </div>
          <div class="bg-white rounded-2xl p-4 flex flex-col justify-between min-h-[110px]">
            <span class="text-xs text-slate-500 font-medium">⏳ Menunggu Verifikasi</span>
            <span class="text-2xl font-bold text-amber-600 mt-2">${state.surat.filter(s => s.status === 'Menunggu Approve').length} Berkas</span>
            <p class="text-[10px] text-slate-400 mt-1">Butuh Otorisasi Kepala Desa</p>
          </div>
        </div>
        <p class="text-xs text-slate-400 italic">Pilih menu "Surat Keterangan" untuk mengelola berkas administrasi desa.</p>
      `;
    }

    // TAB MANAGEMENT SURAT (DIFERENSIASI FITUR UTAMA PETUGAS VS ADMIN)
    function renderTabSurat() {
      const panel = document.getElementById('main-panel-content');
      
      let actionHeader = currentUser.role === 'admin' ? 'Otorisasi Kepala Desa' : 'Aksi Staf Pelayanan';
      
      let rowsHtml = state.surat.map(s => {
        let actionButtons = "";
        
        if (currentUser.role === 'admin') {
          // ADMIN: HANYA APPROVE & TTE
          if(s.status === "Menunggu Approve") {
            actionButtons = `<button onclick="approveSurat(${s.id})" class="bg-emerald-600 hover:bg-emerald-700 text-white text-[10px] font-bold px-3 py-1.5 rounded-xl transition">✍️ Approve & TTE</button>`;
          } else {
            actionButtons = `<span class="text-[11px] text-emerald-600 font-semibold bg-emerald-50 px-2.5 py-1 rounded-lg">🔒 Dokumen Valid (TTE)</span>`;
          }
        } else {
          // PETUGAS: MENGEDIT, MENGHAPUS, DAN MENCETAK
          let cetakBtn = s.status === "Selesai (TTE)" 
            ? `<button onclick="cetakSurat('${s.nama}')" class="bg-indigo-600 hover:bg-indigo-700 text-white text-[10px] font-bold px-3 py-1.5 rounded-xl transition">🖨️ Cetak Surat</button>` 
            : `<button class="bg-slate-100 text-slate-400 text-[10px] font-bold px-3 py-1.5 rounded-xl cursor-not-allowed" title="Menunggu TTE Kades" disabled>⏳ Belum Di-approve</button>`;

          actionButtons = `
            <div class="flex items-center gap-1.5">
              <button onclick="editSurat(${s.id})" class="bg-amber-500 hover:bg-amber-600 text-white text-[10px] font-bold px-2.5 py-1.5 rounded-lg transition">✏️ Edit</button>
              <button onclick="hapusSurat(${s.id})" class="bg-red-600 hover:bg-red-700 text-white text-[10px] font-bold px-2.5 py-1.5 rounded-lg transition">🗑️ Hapus</button>
              ${cetakBtn}
            </div>
          `;
        }

        return `
          <tr class="border-b border-slate-100 text-xs text-slate-700 hover:bg-slate-50/50">
            <td class="py-3.5 px-4 font-semibold text-slate-900">#${s.id}</td>
            <td class="py-3.5 px-4 font-medium text-slate-800">${s.nama}<br><span class="text-[10px] text-slate-400">NIK: ${s.nik}</span></td>
            <td class="py-3.5 px-4 text-slate-600">${s.jenis}</td>
            <td class="py-3.5 px-4"><span class="px-2.5 py-1 rounded-full text-[10px] font-bold ${s.status === 'Menunggu Approve' ? 'bg-amber-50 text-amber-700' : 'bg-emerald-50 text-emerald-700'}">${s.status}</span></td>
            <td class="py-3.5 px-4">${actionButtons}</td>
          </tr>
        `;
      }).join('');

      let formInputPetugas = "";
      if (currentUser.role === 'petugas') {
        formInputPetugas = `
          <div class="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm mb-6 text-slate-800">
            <h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-4">📥 Formulir Input Surat Baru (Tugas Petugas)</h3>
            <form onsubmit="inputSuratBaru(event)" class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
              <div>
                <label class="block text-[11px] font-semibold text-slate-500 mb-1">Nama Pemohon</label>
                <input type="text" id="ins-nama" required placeholder="Contoh: Ahmad Dani" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs text-slate-900 focus:outline-none focus:border-indigo-500">
              </div>
              <div>
                <label class="block text-[11px] font-semibold text-slate-500 mb-1">NIK Pemohon</label>
                <input type="text" id="ins-nik" required placeholder="75010XXXXXXXX" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs text-slate-900 focus:outline-none focus:border-indigo-500">
              </div>
              <div class="flex gap-2">
                <div class="flex-1">
                  <label class="block text-[11px] font-semibold text-slate-500 mb-1">Jenis Layanan</label>
                  <select id="ins-jenis" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs text-slate-900 focus:outline-none focus:border-indigo-500">
                    <option>Surat Keterangan Tidak Mampu</option>
                    <option>Surat Pengantar Domisili</option>
                  </select>
                </div>
                <button type="submit" class="bg-slate-900 text-white font-semibold text-xs px-4 h-9 rounded-xl hover:bg-slate-800 transition">Simpan Draft</button>
              </div>
            </form>
          </div>
        `;
      }

      panel.innerHTML = `
        <h2 class="text-xl font-bold text-white tracking-tight mb-6">Modul Manajemen Surat Keterangan Desa</h2>
        
        ${formInputPetugas}

        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-slate-50/70 border-b border-slate-200 text-xs font-bold text-slate-500 uppercase tracking-wider">
                <th class="py-3 px-4">ID</th>
                <th class="py-3 px-4">Pemohon</th>
                <th class="py-3 px-4">Klasifikasi Dokumen</th>
                <th class="py-3 px-4">Status Otoritas</th>
                <th class="py-3 px-4">${actionHeader}</th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
      `;
    }

    // FUNGSI AKSI PETUGAS
    function inputSuratBaru(e) {
      e.preventDefault();
      const nama = document.getElementById('ins-nama').value;
      const nik = document.getElementById('ins-nik').value;
      const jenis = document.getElementById('ins-jenis').value;

      state.surat.push({ id: Date.now().toString().slice(-3), nama, nik, jenis, status: "Menunggu Approve" });
      showToast(`Sukses menginput dokumen atas nama ${nama}! Menunggu TTE Kepala Desa.`, "success");
      renderTabSurat();
    }

    function editSurat(id) {
      const namaBaru = prompt("Ubah Nama Pemohon Dokumen:");
      if(!namaBaru) return;
      let target = state.surat.find(s => s.id === id);
      if(target) {
        target.nama = namaBaru;
        showToast("Perubahan dokumen berhasil disimpan oleh petugas.", "info");
        renderTabSurat();
      }
    }

    function hapusSurat(id) {
      if(confirm("Apakah petugas yakin ingin menghapus arsip surat ini?")) {
        state.surat = state.surat.filter(s => s.id !== id);
        showToast("Arsip dokumen berhasil dihapus secara permanen.", "error");
        renderTabSurat();
      }
    }

    function cetakSurat(nama) {
      showToast(`Membuka berkas PDF... Dokumen milik ${nama} sukses dicetak melalui printer loket!`, "success");
    }

    // FUNGSI AKSI ADMIN (KEPALA DESA)
    function approveSurat(id) {
      let target = state.surat.find(s => s.id === id);
      if(target) {
        target.status = "Selesai (TTE)";
        showToast("Dokumen berhasil di-approve! Tanda Tangan Elektronik (TTE) Kepala Desa sah disematkan.", "success");
        renderTabSurat();
      }
    }

    // NOTIFIKASI TOAST CUSTOM
    function showToast(msg, type = "info") {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      let colors = "bg-slate-900 border-white/10 text-white";
      if(type === "success") colors = "bg-emerald-950 border-emerald-500/30 text-emerald-400";
      if(type === "error") colors = "bg-red-950 border-red-500/30 text-red-400";
      
      toast.className = `px-5 py-3 rounded-2xl border text-xs font-medium shadow-2xl transition-all duration-300 transform translate-x-20 flex items-center gap-2 ${colors}`;
      toast.innerHTML = `<span>⚡</span> <span>${msg}</span>`;
      container.appendChild(toast);
      
      setTimeout(() => { toast.classList.remove('translate-x-20'); }, 10);
      setTimeout(() => { toast.remove(); }, 4500);
    }
  </script>
</body>
</html>
